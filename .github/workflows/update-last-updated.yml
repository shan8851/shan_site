name: Bump siteLastUpdated

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  bump-date:
    # Skip if the push was already from this action
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check and update siteLastUpdated
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          FILE="app/content/operatorFrontDoor.ts"
          CURRENT=$(grep "siteLastUpdated" "$FILE" | grep -oP "\d{4}-\d{2}-\d{2}")

          if [ "$CURRENT" = "$TODAY" ]; then
            echo "Already up to date ($TODAY), skipping."
            exit 0
          fi

          sed -i "s/siteLastUpdated = '$CURRENT'/siteLastUpdated = '$TODAY'/" "$FILE"
          echo "Updated $CURRENT → $TODAY"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$FILE"
          git commit -m "chore: bump siteLastUpdated to $TODAY [skip ci]"
          git push
